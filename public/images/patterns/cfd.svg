
    <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="400" height="400" fill="#0f172a" />
      <g filter="url(#glow)">
        
    <rect x="50" y="150" width="100" height="100" fill="#94a3b8" opacity="0.2" />
    <path d="M50 250 L150 150 L250 200 L350 100" stroke="#f59e0b" stroke-width="8" fill="none" />
    <circle cx="50" cy="250" r="10" fill="#f59e0b" />
    <circle cx="350" cy="100" r="10" fill="#f59e0b" />
    <path d="M370 250 L370 100" stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)" />
    <text x="380" y="175" fill="#22c55e" font-family="sans-serif" font-weight="bold" font-size="24">Profit Difference</text>
  
      </g>
    </svg>
  