
    <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="400" height="400" fill="#0f172a" />
      <g filter="url(#glow)">
        
    <line x1="50" y1="150" x2="350" y2="150" stroke="#ef4444" stroke-width="4" stroke-dasharray="8" />
    <text x="50" y="130" fill="#ef4444" font-weight="bold">Sell (Bid)</text>
    <line x1="50" y1="250" x2="350" y2="250" stroke="#22c55e" stroke-width="4" stroke-dasharray="8" />
    <text x="50" y="280" fill="#22c55e" font-weight="bold">Buy (Ask)</text>
    <path d="M300 150 L300 250" stroke="#f59e0b" stroke-width="8" marker-start="url(#arrow)" marker-end="url(#arrow)" />
    <text x="315" y="210" fill="#f59e0b" font-weight="bold">SPREAD</text>
  
      </g>
    </svg>
  