
    <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="400" height="400" fill="#0f172a" />
      <g filter="url(#glow)">
        
    <line x1="50" y1="200" x2="350" y2="200" stroke="#ffffff" stroke-width="4" opacity="0.5" />
    <text x="50" y="180" fill="#ffffff" font-size="12">RESISTANCE</text>
    <rect x="100" y="220" width="40" height="60" fill="#22c55e" />
    <rect x="180" y="210" width="40" height="70" fill="#22c55e" />
    <rect x="260" y="130" width="40" height="60" fill="#22c55e" stroke="#ffffff" stroke-width="2" />
    <path d="M280 190 L280 100" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)" />
    <text x="300" y="120" fill="#f59e0b" font-weight="bold">BREAKOUT & CLOSE ABOVE</text>
  
      </g>
    </svg>
  