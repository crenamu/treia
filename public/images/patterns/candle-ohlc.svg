
    <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="400" height="400" fill="#0f172a" />
      <g filter="url(#glow)">
        
    <line x1="200" y1="50" x2="200" y2="350" stroke="#ffffff" stroke-width="2" />
    <rect x="150" y="100" width="100" height="200" fill="#22c55e" stroke="#ffffff" stroke-width="2" />
    <line x1="250" y1="300" x2="300" y2="300" stroke="#ffffff" stroke-width="1" />
    <text x="310" y="305" fill="#ffffff">Open</text>
    <line x1="250" y1="100" x2="300" y2="100" stroke="#ffffff" stroke-width="1" />
    <text x="310" y="105" fill="#ffffff">Close</text>
    <line x1="200" y1="50" x2="250" y2="50" stroke="#ffffff" stroke-width="1" />
    <text x="260" y="55" fill="#ffffff">High</text>
    <line x1="200" y1="350" x2="250" y2="350" stroke="#ffffff" stroke-width="1" />
    <text x="260" y="355" fill="#ffffff">Low</text>
  
      </g>
    </svg>
  